<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Executive Copilot v9 - Maestro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ... (Se mantienen tus estilos originales) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa; --w:#ffffff; --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --mag:#a21caf; --magl:#fdf4ff; --magm:#f0abfc;
  --grn:#15803d; --grnl:#f0fdf4; --grnm:#86efac;
  --cya:#0e7490; --cyal:#ecfeff; --cyam:#67e8f9;
  --org:#c2410c; --orgl:#fff7ed; --orgm:#fdba74;
  --grl:#475569; --grll:#f8fafc; --grlm:#94a3b8;
  --mkt:#6d28d9; --mktl:#f5f3ff; --mktm:#c4b5fd;
  --sky:#0369a1; --skyl:#f0f9ff; --skym:#38bdf8;
  --red:#b91c1c; --redl:#fef2f2; --redm:#fca5a5;
  --yel:#92400e; --yell:#fffbeb; --yelm:#fcd34d;
  --vio:#5b21b6; --viol:#f5f3ff; --viom:#c4b5fd;
  --r:24px;--rsm:16px;--rxs:10px;--rtiny:6px;
  --s1:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --s2:0 4px 14px rgba(0,0,0,.08),0 16px 40px rgba(0,0,0,.07);
  --s3:0 8px 28px rgba(0,0,0,.11),0 24px 56px rgba(0,0,0,.09);
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh;}

/* NUEVOS ESTILOS PARA EL DASHBOARD MAESTRO */
.personal-banner {
    grid-column: 1 / -1;
    background: linear-gradient(100deg, #f0f9ff 0%, #fff 100%);
    border: 1px solid var(--skym);
    border-radius: var(--rsm);
    padding: 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease;
}

.main-chart-card {
    background: var(--w);
    border-radius: var(--r);
    padding: 2rem;
    text-align: center;
    position: relative;
    box-shadow: var(--s2);
    display: flex;
    flex-direction: column;
    align-items: center;
}

#status-center-number {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.status-val { font-size: 2.5rem; font-weight: 800; line-height: 1; }
.status-lbl { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-top: 4px; }

/* Semáforo */
.st-green { color: var(--grn); }
.st-orange { color: var(--org); }
.st-red { color: var(--red); }

/* (Se mantienen el resto de tus estilos Kanban, Modal, etc) */
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--g100);}
.csm{background:var(--w);border-radius:var(--rsm);box-shadow:var(--s1);border:1px solid var(--g100);}
.surf{background:var(--g50);border-radius:var(--rxs);border:1px solid var(--g200);}
.dept-tag{ display:inline-flex;align-items:center;gap:.25rem; font-size:.61rem;font-weight:700;padding:.16rem .52rem;border-radius:99px; background:var(--dl,var(--g100));color:var(--dc,var(--g500)); border:1px solid var(--dm,var(--g300));}
.dept-line{border-left:3px solid var(--dc,var(--g300));}
.btn{ display:inline-flex;align-items:center;justify-content:center;gap:.35rem; font-size:.79rem;font-weight:700;padding:.5rem 1rem; border-radius:var(--rxs);border:none;cursor:pointer; transition:all .14s;font-family:inherit;}
.b-dk{background:var(--g900);color:#fff;}
.b-gem{background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;}
.fld{ width:100%;background:var(--g50); border:1.5px solid var(--g200);border-radius:var(--rxs); padding:.54rem .84rem;font-size:.81rem;color:var(--g900); outline:none;}
.lbl{ display:block;font-size:.63rem;font-weight:700;color:var(--g500); margin-bottom:.28rem;text-transform:uppercase;letter-spacing:.08em;}
.mbd{position:fixed;inset:0;z-index:500;background:rgba(17,24,39,.36);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;}
.mbox{background:var(--w);border-radius:var(--r);box-shadow:var(--s3);width:100%;max-height:93vh;overflow-y:auto;}
</style>
</head>
<body>

<div id="toasts"></div>

<header style="background:var(--w);border-bottom:1px solid var(--g100);position:sticky;top:0;z-index:200;padding:.74rem 1.4rem;">
  <div style="max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:.65rem;">
        <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0369a1,#6d28d9);display:flex;align-items:center;justify-content:center;">
            <svg width="17" height="17" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
            <p style="font-size:.83rem;font-weight:800;color:var(--g900);">AI Executive Copilot</p>
            <span style="font-size:.59rem;font-weight:700;color:var(--grn);" id="sync-lbl">● Sincronización Automática</span>
        </div>
    </div>
    <div style="display:flex;gap:.5rem;">
        <button onclick="oTM()" class="btn b-dk">+ Tarea / Reunión</button>
    </div>
  </div>
</header>

<main style="max-width:1440px;margin:1.5rem auto;padding:0 1.4rem;display:grid;grid-template-columns: 1fr 2fr; gap:1.5rem;">

    <div style="display:flex;flex-direction:column;gap:1.5rem;">
        
        <div class="personal-banner" id="personal-reminder">
            <span style="font-size: 1.5rem;">📅</span>
            <div>
                <p style="font-size: 0.85rem; font-weight: 800; color: var(--g900);">Agenda & Cumpleaños</p>
                <p id="personal-txt" style="font-size: 0.75rem; color: var(--g500);">No hay eventos para hoy.</p>
            </div>
        </div>

        <div class="main-chart-card">
            <p style="font-size: 0.9rem; font-weight: 800; margin-bottom: 1.5rem;">Estado de Carga Operativa</p>
            <div style="width: 240px; height: 240px; position: relative;">
                <canvas id="efficiencyChart"></canvas>
                <div id="status-center-number">
                    <p id="main-status-val" class="status-val st-green">0</p>
                    <p id="main-status-lbl" class="status-lbl">Tareas</p>
                </div>
            </div>
            <p id="sanity-msg" style="margin-top: 1.5rem; font-size: 0.75rem; font-weight: 600; color: var(--g500);">Todo bajo control hoy.</p>
        </div>
    </div>

    <div class="card" style="padding: 1.5rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1rem; font-weight: 800;">Tareas y Sesiones Activas</h2>
            <div id="filter-depts" style="display:flex; gap:0.3rem;"></div>
        </div>
        <div id="task-container" style="display:flex; flex-direction:column; gap:0.75rem;">
            </div>
    </div>

</main>

<div id="m-t" class="mbd" style="display:none;">
    <div class="mbox" style="max-width:600px; padding: 2rem;">
        <h3 style="margin-bottom:1.5rem;">Nueva Tarea o Reunión</h3>
        <label class="lbl">Título</label>
        <input id="mt-tit" type="text" class="fld" placeholder="Ej: Reunión de estrategia o Revisar KPI">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem;">
            <div>
                <label class="lbl">Departamento</label>
                <select id="mt-dept" class="fld">
                    <option value="G">⚪ Gestión</option>
                    <option value="P">🟣 Producto</option>
                    <option value="M">🟪 Marketing</option>
                    <option value="R">🤝 Reunión</option> <option value="Personal">🎂 Personal / Cumpleaños</option>
                </select>
            </div>
            <div>
                <label class="lbl">Dateline (Inicio/Entrega)</label>
                <input id="mt-dl" type="datetime-local" class="fld">
            </div>
        </div>
        
        <div style="margin-top:1.5rem; display:flex; gap:0.5rem; justify-content:flex-end;">
            <button onclick="cTM()" class="btn b-gh">Cancelar</button>
            <button onclick="saveTask()" class="btn b-dk">Guardar</button>
        </div>
    </div>
</div>

<script>
// ══════════════════════════════════════
//  CONFIGURACIÓN FIREBASE (ASEGÚRATE DE PONER TUS CLAVES)
// ══════════════════════════════════════
const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    databaseURL: "TU_DATABASE_URL",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tasksRef = db.ref('tasks');

let efficiencyChart;

// ── INICIALIZAR GRÁFICO ──
function initChart() {
    const ctx = document.getElementById('efficiencyChart').getContext('2d');
    efficiencyChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Completado', 'Restante'],
            datasets: [{
                data: [0, 100],
                backgroundColor: ['#15803d', '#f3f4f6'],
                borderWidth: 0,
                cutout: '85%'
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: true,
            plugins: { legend: { display: false } } 
        }
    });
}

// ── SINCRONIZACIÓN AUTOMÁTICA (EL "OÍDO") ──
tasksRef.on('value', (snapshot) => {
    const data = snapshot.val();
    renderAll(data);
});

function renderAll(data) {
    const container = document.getElementById('task-container');
    container.innerHTML = '';
    if(!data) {
        updateDashboard(0, 0);
        return;
    }

    const ahora = new Date();
    let totalPendientes = 0;
    let personalEvents = [];

    Object.keys(data).forEach(id => {
        const t = data[id];
        if(t.status === 'finalizado') return;

        totalPendientes++;
        const dl = new Date(t.deadline);
        const esReunion = t.dept === 'R' || t.name.toLowerCase().includes('reunión');
        const esPersonal = t.dept === 'Personal';

        if(esPersonal) personalEvents.push(t.name);

        // Lógica de Emojis y retrasos
        let emoji = esReunion ? "🗓️" : "✅";
        let colorClase = "dept-line";

        if(!esReunion && t.deadline && dl < ahora) {
            emoji = "⏰"; // Tarde
            colorClase = "shk"; // Animación de aviso
        }

        const div = document.createElement('div');
        div.className = `card dept-line dp-${t.dept} fu`;
        div.style.padding = "1rem";
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.alignComponents = "center";
        div.style.borderLeft = esReunion ? "5px solid var(--vio)" : "";

        div.innerHTML = `
            <div>
                <p style="font-size:0.85rem; font-weight:700;">${emoji} ${t.name}</p>
                <p style="font-size:0.65rem; color:var(--g500);">${t.deadline ? t.deadline.replace('T', ' ') : 'Sin fecha'}</p>
            </div>
            <button onclick="deleteTask('${id}')" class="bic">✕</button>
        `;
        container.appendChild(div);
    });

    updateDashboard(totalPendientes, personalEvents);
}

function updateDashboard(total, personal) {
    const valEl = document.getElementById('main-status-val');
    const msgEl = document.getElementById('sanity-msg');
    const persEl = document.getElementById('personal-txt');

    valEl.innerText = total;

    // Semáforo de colores inteligente
    if(total > 8) {
        valEl.className = "status-val st-red";
        msgEl.innerText = "¡CRÍTICO! Demasiada carga para hoy.";
        msgEl.style.color = "var(--red)";
    } else if (total > 4) {
        valEl.className = "status-val st-orange";
        msgEl.innerText = "Carga moderada. Mantén el foco.";
        msgEl.style.color = "var(--org)";
    } else {
        valEl.className = "status-val st-green";
        msgEl.innerText = "Todo bajo control. Flujo óptimo.";
        msgEl.style.color = "var(--grn)";
    }

    // Actualizar Área Personal
    if(personal.length > 0) {
        persEl.innerText = "Hoy: " + personal.join(', ');
        persEl.style.color = "var(--vio)";
    } else {
        persEl.innerText = "No hay eventos personales para hoy.";
        persEl.style.color = "var(--g500)";
    }
}

// ── ACCIONES ──
function saveTask() {
    const title = document.getElementById('mt-tit').value;
    const dept = document.getElementById('mt-dept').value;
    const dl = document.getElementById('mt-dl').value;

    if(!title) return;

    tasksRef.push({
        name: title,
        dept: dept,
        deadline: dl,
        status: 'pendiente',
        createdAt: Date.now()
    });

    cTM();
}

function deleteTask(id) {
    tasksRef.child(id).remove();
}

// Modales rápidos
function oTM() { document.getElementById('m-t').style.display = 'flex'; }
function cTM() { document.getElementById('m-t').style.display = 'none'; }

window.onload = () => {
    initChart();
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Executive Copilot v9 - Maestro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS (TUS ORIGINALES)
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa; --w:#ffffff; --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --mag:#a21caf; --magl:#fdf4ff; --magm:#f0abfc;
  --grn:#15803d; --grnl:#f0fdf4; --grnm:#86efac;
  --cya:#0e7490; --cyal:#ecfeff; --cyam:#67e8f9;
  --org:#c2410c; --orgl:#fff7ed; --orgm:#fdba74;
  --grl:#475569; --grll:#f8fafc; --grlm:#94a3b8;
  --mkt:#6d28d9; --mktl:#f5f3ff; --mktm:#c4b5fd;
  --sky:#0369a1; --skyl:#f0f9ff; --skym:#38bdf8;
  --red:#b91c1c; --redl:#fef2f2; --redm:#fca5a5;
  --yel:#92400e; --yell:#fffbeb; --yelm:#fcd34d;
  --vio:#5b21b6; --viol:#f5f3ff; --viom:#c4b5fd;
  --r:24px;--rsm:16px;--rxs:10px;--rtiny:6px;
  --s1:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --s2:0 4px 14px rgba(0,0,0,.08),0 16px 40px rgba(0,0,0,.07);
  --s3:0 8px 28px rgba(0,0,0,.11),0 24px 56px rgba(0,0,0,.09);
}

/* NUEVA ESTRUCTURA MAESTRO */
.master-layout {
    max-width: 1440px;
    margin: 1.5rem auto;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    padding: 0 1.4rem;
}

/* MANTENEMOS TODOS TUS ESTILOS DE BOTONES Y SURFACES */
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--g900);min-height:100vh;}
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--g100);padding:1.5rem;}
.surf{background:var(--g50);border-radius:var(--rxs);border:1px solid var(--g200);padding:0.8rem;}
.fld{width:100%;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--rxs);padding:.54rem .84rem;font-size:.81rem;outline:none;}
.lbl{display:block;font-size:.63rem;font-weight:700;color:var(--g500);margin-bottom:.28rem;text-transform:uppercase;letter-spacing:.08em;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;font-size:.79rem;font-weight:700;padding:.5rem 1rem;border-radius:var(--rxs);border:none;cursor:pointer;transition:all .14s;}
.b-dk{background:var(--g900);color:#fff;}
.b-gh{background:var(--g50);color:var(--g700);border:1.5px solid var(--g200);}
.b-sky{background:var(--sky);color:#fff;}
.b-gem{background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;}

/* Dept tags y líneas */
.dp-P{--dc:var(--mag);--dl:var(--magl);--dm:var(--magm);}
.dp-F{--dc:var(--grn);--dl:var(--grnl);--dm:var(--grnm);}
.dp-O{--dc:var(--cya);--dl:var(--cyal);--dm:var(--cyam);}
.dp-L{--dc:var(--org);--dl:var(--orgl);--dm:var(--orgm);}
.dp-G{--dc:var(--grl);--dl:var(--grll);--dm:var(--grlm);}
.dp-M{--dc:var(--mkt);--dl:var(--mktl);--dm:var(--mktm);}
.dp-R{--dc:var(--vio);--dl:var(--viol);--dm:var(--viom);}
.dept-line{border-left:5px solid var(--dc, var(--g300)); margin-bottom: 0.8rem;}

/* Semáforo e Indicadores */
.st-val { font-size: 3rem; font-weight: 800; line-height: 1; }
.st-green { color: var(--grn); }
.st-orange { color: var(--org); }
.st-red { color: var(--red); }

/* Modales */
.mbd{position:fixed;inset:0;z-index:500;background:rgba(17,24,39,.36);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;}
.mbox{background:var(--w);border-radius:var(--r);box-shadow:var(--s3);width:100%;max-height:93vh;overflow-y:auto;position:relative;}
.bic{width:32px;height:32px;border-radius:var(--rxs);border:1.5px solid var(--g200);background:var(--w);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
</style>
</head>
<body>

<div id="m-t" class="mbd" style="display:none;">
    <div class="mbox si" style="max-width:680px; padding:2rem;">
        <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
            <p id="mth" style="font-weight:800;">Gestión de Tarea / Reunión</p>
            <button onclick="cM('m-t')" class="bic">✕</button>
        </div>
        
        <input type="hidden" id="mt-id">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
            <div style="grid-column: span 2;">
                <label class="lbl">Título (NLP activado)</label>
                <input id="mt-tit" type="text" class="fld" placeholder="¿Qué hay que hacer?" oninput="onNLP()">
            </div>
            <div>
                <label class="lbl">Departamento</label>
                <select id="mt-dept" class="fld">
                    <option value="G">⚪ Gestión</option>
                    <option value="P">🟣 Producto</option>
                    <option value="F">🟢 C. Físico</option>
                    <option value="O">🩵 C. Online</option>
                    <option value="M">🟪 Marketing</option>
                    <option value="R">🤝 Reunión (Agenda)</option>
                    <option value="Personal">🎂 Personal</option>
                </select>
            </div>
            <div>
                <label class="lbl">Dateline / Inicio</label>
                <input id="mt-dl" type="datetime-local" class="fld">
            </div>
        </div>

        <div class="surf" style="margin-bottom:1.5rem;">
            <p class="lbl" style="color:var(--sky);">📋 Checklist / Orden del día</p>
            <div id="cl-l" style="margin-bottom:0.8rem;"></div>
            <div style="display:flex; gap:0.5rem;">
                <input id="cl-i" type="text" class="fld" placeholder="Añadir punto..." onkeydown="if(event.key==='Enter')addCL()">
                <button onclick="addCL()" class="btn b-gh">+</button>
            </div>
        </div>

        <div>
            <label class="lbl">Notas de Sesión / Memoria Operativa</label>
            <textarea id="mt-not" class="fld" rows="4"></textarea>
        </div>

        <div style="margin-top:1.5rem; display:flex; justify-content:flex-end; gap:0.5rem;">
            <button onclick="abGemini()" class="btn b-gem">✨ Gemini</button>
            <button onclick="cM('m-t')" class="btn b-gh">Cancelar</button>
            <button onclick="gT()" id="mt-btn" class="btn b-dk">Guardar Cambios</button>
        </div>
    </div>
</div>

<header style="background:var(--w);border-bottom:1px solid var(--g100);position:sticky;top:0;z-index:200;padding:.74rem 1.4rem;">
  <div style="max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:.65rem;">
        <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0369a1,#6d28d9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;">AI</div>
        <div>
            <p style="font-size:.83rem;font-weight:800;color:var(--g900);">AI Executive Copilot v9</p>
            <p style="font-size:.59rem;font-weight:700;color:var(--grn);">● Sincronizado</p>
        </div>
    </div>
    <div style="display:flex; gap:0.5rem;">
        <button onclick="syncMobile()" class="btn b-gh" style="color:var(--sky)">📲 sincronizar móvil</button>
        <button onclick="oTM()" class="btn b-dk">+ Tarea / Reunión</button>
    </div>
  </div>
</header>

<div class="master-layout">
    <aside style="display:flex; flex-direction:column; gap:1.5rem;">
        <div class="card" style="background:linear-gradient(135deg, #f0f9ff, #fff); border:1px solid var(--skym);">
            <p class="lbl">Agenda Personal & Cumpleaños</p>
            <p id="pers-txt" style="font-size:0.8rem; font-weight:600; color:var(--g700); margin-top:5px;">No hay eventos hoy.</p>
        </div>

        <div class="card" style="text-align:center;">
            <p class="lbl">Carga de Trabajo Operativa</p>
            <div style="position:relative; width:200px; height:200px; margin:1.5rem auto;">
                <canvas id="mainChart"></canvas>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">
                    <p id="st-num" class="st-val st-green">0</p>
                    <p style="font-size:0.6rem; font-weight:800; color:var(--g400);">TAREAS</p>
                </div>
            </div>
            <p id="sanity-msg" style="font-size:0.75rem; font-weight:700; color:var(--g500);">Situación óptima</p>
        </div>
    </aside>

    <main class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h2 style="font-size:1.1rem; font-weight:800;">Panel de Control Operativo</h2>
        </div>
        <div id="task-render-list">
            </div>
    </main>
</div>

<script>
// --- TU CONFIGURACIÓN DE FIREBASE (PEGA LA TUYA AQUÍ) ---
const firebaseConfig = { /* ... tu config ... */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tasksRef = db.ref('tasks');

let mainChart;
let currentChecklist = [];

// --- INICIALIZACIÓN DEL DASHBOARD ---
function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    mainChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{ data: [0, 100], backgroundColor: ['#15803d', '#f3f4f6'], borderWidth: 0, cutout: '85%' }]
        },
        options: { plugins: { legend: { display: false } } }
    });
}

// --- RENDERIZADO CON TU LÓGICA V8 + MEJORAS ---
function renderTasks(data) {
    const container = document.getElementById('task-render-list');
    container.innerHTML = '';
    if(!data) { updateDashboard(0, []); return; }

    const ahora = new Date();
    let totalPendientes = 0;
    let personal = [];

    Object.keys(data).forEach(id => {
        const t = data[id];
        if(t.status === 'finalizado') return;

        totalPendientes++;
        const dl = new Date(t.deadline);
        const esReunion = t.dept === 'R' || (t.name && t.name.toLowerCase().includes('reunión'));
        if(t.dept === 'Personal') personal.push(t.name);

        // Lógica de Emojis: Las reuniones NO marcan alerta de retraso
        let emoji = esReunion ? "🗓️" : "✅";
        let urgencyStyle = "";

        if(!esReunion && t.deadline && dl < ahora) {
            emoji = "⏰";
            urgencyStyle = "background: var(--redl); border-left: 5px solid var(--red);";
        }

        const div = document.createElement('div');
        div.className = `card dept-line dp-${t.dept}`;
        div.style = `margin-bottom:0.8rem; padding:1rem; display:flex; justify-content:space-between; align-items:center; ${urgencyStyle}`;
        
        div.innerHTML = `
            <div onclick="editTask('${id}')" style="cursor:pointer; flex:1;">
                <p style="font-weight:700; font-size:0.9rem;">${emoji} ${t.name}</p>
                <div style="display:flex; gap:10px; margin-top:4px;">
                    <span class="dept-tag">${t.dept}</span>
                    <span style="font-size:0.65rem; color:var(--g500);">📅 ${t.deadline ? t.deadline.replace('T', ' ') : 'S/D'}</span>
                </div>
            </div>
            <button onclick="deleteTask('${id}')" style="background:none; border:none; color:var(--red); cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
    });

    updateDashboard(totalPendientes, personal);
}

function updateDashboard(total, personal) {
    const stNum = document.getElementById('st-num');
    const stMsg = document.getElementById('sanity-msg');
    stNum.innerText = total;

    // EL SEMÁFORO INTELIGENTE
    if(total > 8) {
        stNum.className = 'st-val st-red';
        stMsg.innerText = "¡CRÍTICO! Demasiada carga acumulada.";
    } else if (total > 4) {
        stNum.className = 'st-val st-orange';
        stMsg.innerText = "CARGA ALTA: Prioriza cierres.";
    } else {
        stNum.className = 'st-val st-green';
        stMsg.innerText = "SITUACIÓN ÓPTIMA: Flujo controlado.";
    }

    document.getElementById('pers-txt').innerText = personal.length > 0 ? "Hoy: " + personal.join(', ') : "Sin eventos hoy.";
}

// --- MANTENEMOS TUS FUNCIONES gT(), addCL(), editTask() Y NLP ORIGINALES ---
// ... [Pega aquí tus funciones de lógica de negocio del script original] ...

window.onload = () => {
    initChart();
    tasksRef.on('value', (snapshot) => { renderTasks(snapshot.val()); });
};

function syncMobile() {
    alert("Generando enlace seguro de sincronización para tu móvil...");
}
</script>
</body>
</html>

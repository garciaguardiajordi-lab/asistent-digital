<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Executive Copilot v9 - Sin Area Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ══════════════════════════════════════
    DESIGN TOKENS
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6fa;
  --w:#ffffff;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --mag:#a21caf;--magl:#fdf4ff;--magm:#f0abfc;
  --grn:#15803d;--grnl:#f0fdf4;--grnm:#86efac;
  --cya:#0e7490;--cyal:#ecfeff;--cyam:#67e8f9;
  --org:#c2410c;--orgl:#fff7ed;--orgm:#fdba74;
  --grl:#475569;--grll:#f8fafc;--grlm:#94a3b8;
  --mkt:#6d28d9;--mktl:#f5f3ff;--mktm:#c4b5fd;
  --sky:#0369a1;--skyl:#f0f9ff;--skym:#38bdf8;
  --red:#b91c1c;--redl:#fef2f2;--redm:#fca5a5;
  --yel:#92400e;--yell:#fffbeb;--yelm:#fcd34d;
  --vio:#5b21b6;--viol:#f5f3ff;--viom:#c4b5fd;
  --r:24px;--rsm:16px;--rxs:10px;--rtiny:6px;
  --s1:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --s2:0 4px 14px rgba(0,0,0,.08),0 16px 40px rgba(0,0,0,.07);
  --s3:0 8px 28px rgba(0,0,0,.11),0 24px 56px rgba(0,0,0,.09);
}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:99px;}

/* ── SURFACES ── */
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--g100);}
.csm{background:var(--w);border-radius:var(--rsm);box-shadow:var(--s1);border:1px solid var(--g100);}
.surf{background:var(--g50);border-radius:var(--rxs);border:1px solid var(--g200);}

/* ── LAYOUT DUAL ── */
.layout-grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:1.4rem;
  align-items:start;
  max-width:1440px;
  margin:0 auto;
  padding:1.1rem 1.4rem;
}

#dashboard-aside{
  position:sticky;
  top:1.1rem;
  display:flex;
  flex-direction:column;
  gap:.85rem;
}

/* Sanity Check */
.dash-sanity{
  background:var(--w);
  border-radius:var(--r);
  border:1px solid var(--g100);
  box-shadow:var(--s1);
  padding:1.15rem;
  text-align:center;
}
#sanity-number{
  font-size:3.8rem;
  font-weight:900;
  line-height:1;
  margin:.55rem 0 .35rem;
  transition:color .4s;
}
.sanity-grn{color:var(--grn);}
.sanity-org{color:#ea580c;}
.sanity-red{color:var(--red);}

/* Botones y otros estilos base */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;font-size:.79rem;font-weight:700;padding:.5rem 1rem;border-radius:var(--rxs);border:none;cursor:pointer;transition:all .14s;font-family:inherit;}
.b-dk{background:var(--g900);color:#fff;}
.b-gh{background:var(--g50);color:var(--g700);border:1.5px solid var(--g200);}
.bic{width:32px;height:32px;flex-shrink:0;border-radius:var(--rxs);border:1.5px solid var(--g200);background:var(--w);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}

/* MODALES Y DEMÁS (Omitidos por brevedad en CSS para no saturar, pero mantenidos en el motor) */
.mbd{position:fixed;inset:0;z-index:500;background:rgba(17,24,39,.36);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;}
.mbox{background:var(--w);border-radius:var(--r);box-shadow:var(--s3);width:100%;max-height:93vh;overflow-y:auto;position:relative;}

/* ... Resto de estilos de v9 ... */
</style>
</head>
<body>

<div id="toasts" style="position:fixed;top:1rem;right:1rem;z-index:800;display:flex;flex-direction:column;gap:.4rem;max-width:300px;width:100%;pointer-events:none;"></div>

<header style="background:var(--w);border-bottom:1px solid var(--g100);position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(0,0,0,.04);">
  <div style="max-width:1440px;margin:0 auto;padding:.74rem 1.4rem;display:flex;align-items:center;gap:.58rem;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:.65rem;margin-right:auto;">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0369a1,#6d28d9);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(3,105,161,.28);flex-shrink:0;">
        <svg width="17" height="17" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <div>
        <p style="font-size:.83rem;font-weight:800;color:var(--g900);line-height:1.25;">AI Executive Copilot</p>
      </div>
    </div>
    <button class="btn b-gh">sincronizar móvil</button>
    <button onclick="oTM()" class="btn b-dk">+ Nueva Tarea</button>
  </div>
</header>

<main class="layout-grid">
  <aside id="dashboard-aside">
    
    <div class="dash-sanity">
      <p style="font-size:.65rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;">Carga de Trabajo</p>
      <div id="sanity-number" class="sanity-grn">0</div>
      <p id="sanity-status" style="font-size:.68rem;font-weight:600;color:var(--g400);">Estado Óptimo</p>
    </div>

    <div class="dash-reuniones">
      <div style="padding:.9rem 1rem .4rem;display:flex;align-items:center;justify-content:space-between;">
        <p style="font-size:.72rem;font-weight:800;color:var(--g900);">Agenda Hoy</p>
        <span class="dept-tag dp-R">🗓️ R</span>
      </div>
      <div id="dash-reuniones-body" class="dash-reuniones-body">
        </div>
    </div>
  </aside>

  <section id="main-content">
    <div class="card" style="padding:1.5rem; min-height: 400px;">
       <p style="color:var(--g400); font-size: .8rem;">Contenido de tareas y proyectos...</p>
    </div>
  </section>
</main>

<script>
// Lógica de Firebase y Renderizado (Mantener igual)
// Asegúrate de que la función que cuenta tareas actualice #sanity-number
function updateSanity(count) {
    const el = document.getElementById('sanity-number');
    const status = document.getElementById('sanity-status');
    el.innerText = count;
    
    if(count > 8) {
        el.className = 'sanity-red';
        status.innerText = 'Saturación Crítica';
    } else if(count >= 5) {
        el.className = 'sanity-org';
        status.innerText = 'Carga Elevada';
    } else {
        el.className = 'sanity-grn';
        status.innerText = 'Estado Óptimo';
    }
}
</script>

</body>
</html>
